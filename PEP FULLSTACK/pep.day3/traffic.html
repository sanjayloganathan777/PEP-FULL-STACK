<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Signal</title>
  <style>
    .traffic-signal {
      width: 100px;
      margin:auto;
      background: #333;
      padding: 20px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;      
      align-items: center;
      gap: 15px;
    }

    .light {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #111;
      box-shadow: inset 0 0 10px #000;
    }

    .red {
      background: red;
    }

    .yellow {
      background: yellow;
    }

    .green {
      background: green;
    }
  </style>
  
</head>
<center>
<h1>Traffic signal</h1>
</center>

<body>
  <div class="traffic-signal">
    <div class="light red"></div>
    <div class="light yellow"></div>
    <div class="light green"></div>
  </div>
</body>
</html>
