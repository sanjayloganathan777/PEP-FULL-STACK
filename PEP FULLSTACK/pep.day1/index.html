<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Games Home</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }
    header {
      background: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #444;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .games-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .game-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      margin: 15px;
      width: 280px;
      text-align: center;
      padding: 20px;
    }
    .game-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
    }
    .game-card h3 {
      margin: 10px 0;
    }
    .game-card button {
      padding: 10px 20px;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .game-card button:hover {
      background: #45a049;
    }
    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Sports Games Hub</h1>
    <p>Pick your favorite sport and start playing!</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">All Games</a>
    <a href="#">Top Scores</a>
    <a href="#">About</a>
  </nav>

  <section class="games-section">
    <div class="game-card">
      <img src="cricket.jpg" alt="Cricket Game">
      <h3>Cricket</h3>
      <p>Play the ultimate cricket challenge.</p>
      <button onclick="location.href='cricket-game.html'">Play Now</button>
    </div>
    <div class="game-card">
      <img src="volleyball.jpg" alt="Volleyball Game">
      <h3>Volleyball</h3>
      <p>Smash and block your way to victory.</p>
      <button onclick="location.href='volleyball-game.html'">Play Now</button>
    </div>
    <div class="game-card">
      <img src="tennis.jpg" alt="Tennis Game">
      <h3>Tennis</h3>
      <p>Serve and rally in this tennis showdown.</p>
      <button onclick="location.href='tennis-game.html'">Play Now</button>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Sports Games Hub. All rights reserved.</p>
  </footer>
</body>
</html>
